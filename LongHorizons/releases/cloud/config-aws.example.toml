# AWS Cloud Agent — Example Configuration
[agent] id = "aws-prod-01"
[paths] data_dir = "/var/lib/cloud-agent/aws"

[aws]
regions = ["us-east-1", "us-west-2", "eu-west-1"]
poll_interval_secs = 60

[aws.services]
cloudtrail = true; vpc_flow_logs = true; guardduty = true; security_hub = true
s3_access_logs = true; waf_logs = true; route53_logs = false; elb_logs = false; config_rules = true

[aws.credential]  # Leave empty for default credential chain (IAM role recommended)
# access_key = "AKIAIOSFODNN7EXAMPLE"
# secret_key = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
# role_arn = "arn:aws:iam::123456789012:role/CloudAgentRole"

[export.events] endpoint = "http://elasticsearch:9200/_bulk"; api_key = "CHANGEME"; index_pattern = "cloud-events-aws"
[export.health] endpoint = "http://elasticsearch:9200/_bulk"; api_key = "CHANGEME"; index_pattern = "cloud-health"
