# ── Normalization ────────────────────────────────────────────────────────

[normalization]
allow_raw_fields = true
ip_stable_handling = "map"          # "preserve" | "map" — IP→class for tokenization
anonymize_src_ip = false
anonymize_dst_ip = false

# ── Baselining ───────────────────────────────────────────────────────────

[baselining]
decay_half_life_days = 30.0
rare_threshold = 10.0
pattern_export_daily = true
top_payload_k = 10
reservoir_size_per_stable = 3
outbox_retention_seconds = 604800   # 7 days

# ── Enrichment ───────────────────────────────────────────────────────────

[enrichment]
geoip_enabled = false               # Set true and provide MaxMind GeoLite2 DBs
geoip_db_path = "/var/lib/firewall-agent/GeoLite2-Country.mmdb"
asn_enabled = false
asn_db_path = "/var/lib/firewall-agent/GeoLite2-ASN.mmdb"
threat_intel_enabled = false
# abuseipdb_api_key = "CHANGEME"
# virustotal_api_key = "CHANGEME"

# ── Export to Elasticsearch ──────────────────────────────────────────────

[export.events]
enable = true
endpoint = "http://elasticsearch:9200/_bulk"
api_key = "CHANGEME"
index_pattern = "firewall-events"
gzip = true
bulk_max_docs = 2000
bulk_max_bytes = 5000000
timeout_seconds = 30

[export.diagnostics]
enable = true
endpoint = "http://elasticsearch:9200/_bulk"
api_key = "CHANGEME"
index_pattern = "firewall-diagnostics"
gzip = true
bulk_max_docs = 100
bulk_max_bytes = 500000
timeout_seconds = 15

[export.health]
enable = true
endpoint = "http://elasticsearch:9200/_bulk"
api_key = "CHANGEME"
index_pattern = "firewall-health"
gzip = true
timeout_seconds = 15
report_interval_seconds = 300
