# Firewall Telemetry Agent — Example Configuration
#
# This agent collects firewall events from ANY source and normalizes them
# into a single ES schema. It can run ON the firewall (nftables/iptables/pf)
# or as a centralized collector (syslog + API pollers + cloud flow logs).

[agent]
id = "firewall-prod-01"
mode = "hybrid"                    # "on-device" | "collector" | "hybrid"
service_name = "firewall-agent"
config_reload_seconds = 60

[paths]
data_dir = "/var/lib/firewall-agent"
db_name = "firewall-agent.db"
log_dir = "logs"
state_dir = "state"

# ── Sources ──────────────────────────────────────────────────────────────

[sources]
nftables = true                    # Modern Linux firewall (kernel 3.13+)
iptables = true                    # Legacy Linux firewall
pf = true                          # FreeBSD/pfSense/OPNsense pf

[sources.syslog]
enable = true
udp_bind_addr = "0.0.0.0:514"     # Receives syslog from ANY firewall vendor
tcp_enable = false
tcp_bind_addr = "0.0.0.0:601"
tls_enable = false                 # Set true for RFC 5425 TLS syslog

# ── Enterprise Firewall API Pollers ──────────────────────────────────────
# Uncomment and configure for each firewall you want to poll via REST API.

