# =============================================================================
# LongHorizons Telemetry Agent — Deployment Configuration
# =============================================================================
#
# This is a fully annotated config template. Every field is documented.
# Defaults are shown as the commented-out value next to each field.
#
# Minimal valid config (everything else defaults):
#   [agent] + id = "my-host"
#   [paths] + db_path, log_dir, state_dir
#   [export.events] + endpoint = "http://es:9200"
#
# =============================================================================


# ---------------------------------------------------------------------------
# [agent] — Agent identity and process settings
# ---------------------------------------------------------------------------
[agent]

# Unique identifier for this host. Use hostname, asset tag, or UUID.
# Empty string auto-generates from host properties (not recommended for prod).
# Default: "default"
id = "CHANGEME"

# Windows service display name. Shown in services.msc.
# Default: "LongHorizonsTelemetryAgent"
service_name = "LongHorizonsTelemetryAgent"

# Windows Event Log source name for agent diagnostics.
# Default: "LongHorizonsTelemetryAgent"
eventlog_source = "LongHorizonsTelemetryAgent"

# Seconds between config file reloads (min 5).
# Set high in production to avoid I/O noise; low during tuning.
# Default: 60
config_reload_seconds = 60

# TCP port for the built-in health/status HTTP server.
# GET http://127.0.0.1:8080/health returns JSON metrics.
# Default: 8080
health_port = 8080


# ---------------------------------------------------------------------------
# [paths] — Filesystem locations (REQUIRED)
# ---------------------------------------------------------------------------
[paths]

# Full path to the SQLite database file.
# WAL-mode concurrency; safe to put on SSD/NVMe.
# Default: "agent.db" (relative — don't use in production)
db_path = "C:\\ProgramData\\LongHorizonsAgent\\state\\agent.db"

# Directory for rotating text log files.
# Default: "logs"
log_dir = "C:\\ProgramData\\LongHorizonsAgent\\logs"

# Directory for persistent state: master encryption key, etc.
# Must be writable by the service account (LocalSystem).
# Default: "state"
state_dir = "C:\\ProgramData\\LongHorizonsAgent\\state"


# ---------------------------------------------------------------------------
# [etw] — Event Tracing for Windows providers
# ---------------------------------------------------------------------------
# ALL 47 providers default to ENABLED. Omit any field to keep it enabled.
# Set to false to suppress high-volume or unneeded providers.
# Session requires Administrator / LocalSystem privileges.
# ---------------------------------------------------------------------------
[etw]

# Kernel trace session name. Must be unique on the system.
# Default: "LongHorizonsTelemetry"
session_name = "LongHorizonsTelemetry"

# --- Kernel providers (high-signal, always enable) ---
# enable_kernel_process     = true   # Process create, exit, handle operations
# enable_kernel_thread      = true   # Thread create, exit, context switches
# enable_kernel_image       = true   # DLL/EXE load and unload
# enable_kernel_network     = true   # TCP/UDP connect, accept, send, receive
# enable_kernel_registry    = true   # Registry key create, delete, set value
# enable_kernel_file        = true   # File create, read, write, delete (Win10+)
# enable_kernel_memory      = true   # Memory allocation, page faults
# enable_kernel_threading   = true   # Thread pool and dispatcher events
# enable_kernel_interrupts  = true   # ISR/DPC events (high volume)
# enable_kernel_boot        = true   # Boot and shutdown diagnostics
# enable_kernel_power       = true   # Sleep, resume, power state transitions
# enable_kernel_processor_power = true  # CPU frequency/P-state changes

# --- Network & DNS ---
# enable_dns_client         = true   # DNS queries and responses
# enable_tcpip              = true   # TCP/IP stack internal events

# --- Windows Security ---
# enable_security_auditing  = true   # Security audit log (4624, 4688, etc.)
# enable_security_mitigation = true  # Exploit protection, CFG, ACG events
# enable_security_spp       = true   # Software Protection Platform
# enable_security_keymanager = true  # Key management and isolation
# enable_security_tpm       = true   # TPM operations and attestation
# enable_defender           = true   # Windows Defender scan/detection events
# enable_code_integrity     = true   # Code integrity (driver signing, CI)
# enable_threat_intelligence = true  # Threat intelligence ETW feed

# --- Application & Scripting ---
# enable_powershell         = true   # PowerShell script block, pipeline, module
# enable_vbscript           = true   # VBScript engine execution
# enable_dotnet_runtime     = true   # .NET runtime (assembly loads, JIT, GC)
# enable_capi2              = true   # Crypto API calls (certificate validation)
# enable_com_classic        = true   # COM object creation and marshalling
# enable_services           = true   # Service start/stop/pause
# enable_smb_client         = true   # SMB client connections
# enable_winrm              = true   # WinRM remote management sessions
# enable_wininet            = true   # WinINet HTTP/HTTPS requests
# enable_winhttp            = true   # WinHTTP client requests
# enable_bits_client        = true   # Background Intelligent Transfer Service
# enable_rpcss              = true   # RPC endpoint mapper and runtime

# --- Application control & deployment ---
# enable_applocker          = true   # AppLocker policy evaluation
# enable_appx_deployment    = true   # AppX/MSIX package install/remove
# enable_app_model          = true   # Application model (UWP lifecycle)

# --- Hyper-V (only fires on Hyper-V hosts) ---
# enable_hyper_v            = true   # Hyper-V hypervisor events
# enable_hyper_v_vmms       = true   # VM management service
# enable_hyper_v_switch     = true   # Virtual switch events
# enable_hyper_v_host       = true   # Host compute service

# --- Storage ---
# enable_storage_disk       = true   # Disk class driver events
# enable_storage_filesystem = true   # File system minifilter events
# enable_storage_spaces     = true   # Storage Spaces health and recovery

# --- Other ---
# enable_wmi_activity       = true   # WMI queries, consumers, and filters
# enable_schannel            = true   # TLS/SSL handshake and channel events
# enable_ntfs                = true   # NTFS file system operations
# enable_win32k              = true   # Win32k.sys kernel callbacks
# enable_filter_manager      = true   # Minifilter manager events
# enable_terminal_services   = true   # RDP session events
# enable_plugin_play         = true   # PnP device enumeration and installation


# ---------------------------------------------------------------------------
# [providers] — ETW provider discovery strategy
# ---------------------------------------------------------------------------
[providers]

# Provider selection mode:
#   "all"      — auto-discover ALL registered ETW providers on the system
#                (uses exclude_patterns to filter out noisy providers)
#   "security" — hardcoded set of ~22 security-critical providers
# Default: "all"
mode = "all"

# Glob patterns for provider names to EXCLUDE in "all" mode.
# These patterns already exclude the noisiest system providers.
# Add patterns for your environment if specific providers cause excessive volume.
# Default: see below
exclude_patterns = [
    "*Heap*",
    "*Driver*",
    "*Trace*",
    "*Kernel-File*",
    "*Circular Kernel*",
    "*File Kernel*",
    "*Critical Section*",
    "*Disk Class*",
    "*ATA Port*",
    "*Classpnp*",
    "*Deduplication*",
    "*Storage*",
    "*IMAPI*",
    "*BCP.*",
    "*ADODB.*",
    "*ADOMD.*",
    "*DBNETLIB.*",
    "*Error Instrument*",
]

# Maximum number of providers to enable in "all" mode.
# 0 = unlimited (enable every discovered provider that isn't excluded).
# Default: 0 (unlimited)
max_providers = 0


# ---------------------------------------------------------------------------
# [normalization] — How identifiers are handled for base token generation
# ---------------------------------------------------------------------------
[normalization]

# SID handling in base tokens.
#   "map"      — Replace all SIDs with <sid> placeholder (deterministic tokens)
#   "preserve" — Keep actual SIDs (tokens differ per user; useful for per-user baselines)
# Default: "map"
sid_handling = "map"

# IP address handling in base tokens.
#   "map"      — Replace IPs with <ip> placeholder
#   "preserve" — Keep actual IPs
# Default: "map"
ip_stable_handling = "map"

# Include the full raw event JSON in exported documents.
# Adds ~2-5 KB per event but provides complete context for LLM enrichment.
# Default: false
allow_raw_fields = false


# ---------------------------------------------------------------------------
# [tokenization] — Token generation settings
# ---------------------------------------------------------------------------
[tokenization]

# Token schema version. Incremented when the token builder algorithm changes.
# Version 1: deterministic base/payload field separation
# Default: 1
schema_version = 1


# ---------------------------------------------------------------------------
# [baselining] — Rarity scoring, deduplication, and export thresholds
# ---------------------------------------------------------------------------
[baselining]

# Exponential decay half-life in days for rarity scoring.
# Score halves every N days without seeing the event.
# Lower = faster decay = events become "rare" more quickly.
# Default: 30
decay_half_life_days = 30

# Rarity band thresholds (decay score based).
#   Score <= rare_threshold  → "Rare"     (immediately exported)
#   Score >= common_threshold → "Common"   (deduplicated)
#   Between                   → "Uncommon" (sampled)
# Default: rare = 10, common = 50
rare_threshold = 10
common_threshold = 50

# Export pattern aggregation documents daily (global pattern stats).
# Default: true
pattern_export_daily = true

# Number of top payload variants to retain per base token.
# Higher = more exemplar diversity, more storage.
# Default: 10
top_payload_k = 10

# Reservoir size per base token (exemplars retained).
# Default: 3
reservoir_size_per_base = 3

# Days before refreshing exemplar events for a base token.
# Default: 7
exemplar_refresh_days = 7

# Risk score threshold (0-100). Events above this always create exemplars.
# Default: 80
risk_score_threshold = 80

# --- Export deduplication ---

# Minimum rarity score for export. Only events with score <= this are exported.
# 0 = most rare only, 100 = export everything.
# Default: 10
export_threshold_score = 10

# Days to wait before re-exporting the same event (by base token).
# 0 = disable dedup (every occurrence ships).
# Default: 30
export_dedup_days = 30

# Immediately export events classified as "Rare".
# Default: true
export_rare_immediately = true

# Maximum documents per elasticsearch bulk request.
# Default: 500
export_batch_size = 500

# Seconds to retain successfully-sent outbox rows before DB cleanup.
# Default: 604800 (7 days)
outbox_retention_seconds = 604800


# ---------------------------------------------------------------------------
# [export.exemplars] — Exemplar event export pipeline
# ---------------------------------------------------------------------------
# Exemplars are individual representative events selected by the reservoir
# sampler — one per base token per rarity boundary cross.
# ---------------------------------------------------------------------------
[export.exemplars]

# Enable this export pipeline.
# Default: true
enable = true

# Elasticsearch endpoint URL.
# For Elastic Cloud: "https://your-deployment.es.region.aws.cloud.es.io:9243"
# For local: "http://localhost:9200"
# Default: "" (must be set)
endpoint = "CHANGEME"

# API key in base64 format "id:api_key".
# Elasticsearch 8.x format: create in Kibana → Management → API Keys.
# Leave empty for unauthenticated access (not recommended).
# Default: "" (no auth)
api_key = "CHANGEME"

# Set to true if api_key above is DPAPI-encrypted (machine-scoped).
# The agent will decrypt it on startup using the LocalMachine DPAPI key.
# Default: false
api_key_is_dpapi_protected = false

# Elasticsearch index name pattern. Supports strftime placeholders.
# Default: "longhorizons-exemplars"
index_pattern = "longhorizons-exemplars"

# Compress bulk requests with gzip.
# Always enabled unless your ES proxy rejects compressed payloads.
# Default: true
gzip = true

# Maximum documents per bulk request.
# Default: 100
bulk_max_docs = 100

# Maximum request body bytes before sending.
# Default: 500_000 (~500 KB)
bulk_max_bytes = 500000

# HTTP request timeout in seconds.
# Default: 15
timeout_seconds = 15

# Rarity threshold for exemplar export. 0 = only rarest events.
# Default: 0
event_rare_threshold = 0

# Days before re-exporting the same exemplar base token.
# 0 = no dedup, always ship.
# Default: 0
event_dedup_days = 0

# TLS certificate pinning — SHA-256 fingerprints of expected server certs.
# Example: ["A4:B9:1F:2C:..."]
# Empty = use system TLS validation only.
# Default: []
tls_pins_sha256 = []


# ---------------------------------------------------------------------------
# [export.events] — Individual event export pipeline
# ---------------------------------------------------------------------------
# Full event documents with all enrichment fields, tokens, and metadata.
# This is the primary feed for the LLM enrichment/dataset pipeline.
# Deduplication is controlled by baselining.export_threshold_score/dedup_days.
# ---------------------------------------------------------------------------
[export.events]

# Enable this export pipeline.
# Default: true
enable = true

# Elasticsearch endpoint.
# Default: "" (must be set)
endpoint = "CHANGEME"

# API key in base64 format.
# Default: "" (no auth)
api_key = "CHANGEME"

# DPAPI-protected flag for api_key.
# Default: false
api_key_is_dpapi_protected = false

# Index name pattern.
# Default: "longhorizons-events"
index_pattern = "longhorizons-events"

# Compress bulk requests.
# Default: true
gzip = true

# Maximum documents per bulk request.
# Default: 2000
bulk_max_docs = 2000

# Maximum request body bytes before sending.
# Default: 5_000_000 (~5 MB)
bulk_max_bytes = 5000000

# HTTP request timeout.
# Default: 30
timeout_seconds = 30

# TLS certificate pins.
# Default: []
tls_pins_sha256 = []

# Rarity threshold — only export events with rarity score <= this.
# Default: 10
event_rare_threshold = 10

# Days before re-exporting the same event (by base token).
# Default: 30
event_dedup_days = 30


# ---------------------------------------------------------------------------
# [export.patterns] — Pattern/aggregation export pipeline
# ---------------------------------------------------------------------------
# Time-series pattern documents: aggregated statistics per base token,
# including count-min sketch frequencies, rarity band transitions,
# and global/provider-level pattern summaries.
# ---------------------------------------------------------------------------
[export.patterns]

# Enable this export pipeline.
# Default: true
enable = true

# Elasticsearch endpoint.
# Default: "" (must be set)
endpoint = "CHANGEME"

# API key in base64 format.
# Default: "" (no auth)
api_key = "CHANGEME"

# DPAPI-protected flag for api_key.
# Default: false
api_key_is_dpapi_protected = false

# Fixed index name (overrides index_pattern when not time-series).
# Default: "longhorizons-patterns"
index_name = "longhorizons-patterns"

# Time-series index pattern (only used when time_series = true).
# Supports strftime placeholders, e.g. "telemetry-patterns-%Y.%m.%d".
# Default: "" (use index_name as single index)
index_pattern = ""

# Use time-series index naming (one index per period).
# Enabling this creates many indexes; useful for rollover/ILM policies.
# Default: false
time_series = false

# Include global (non-host-specific) pattern documents.
# Default: false
send_global_docs = false

# Include full provider property metadata in pattern documents.
# Default: true
include_provider_properties = true

# Compress bulk requests.
# Default: true
gzip = true

# Maximum documents per bulk request.
# Default: 300
bulk_max_docs = 300

# Maximum request body bytes before sending.
# Default: 800_000 (~800 KB)
bulk_max_bytes = 800000

# HTTP request timeout.
# Default: 15
timeout_seconds = 15

# TLS certificate pins.
# Default: []
tls_pins_sha256 = []


# ---------------------------------------------------------------------------
# [export.diagnostics] — Agent health diagnostics export pipeline
# ---------------------------------------------------------------------------
# Agent self-diagnostics: dropped events, ETW restart counts, error rates,
# pipeline throughput. Low volume, useful for monitoring and alerting.
# ---------------------------------------------------------------------------
[export.diagnostics]

# Enable this export pipeline.
# Default: true
enable = true

# Elasticsearch endpoint.
# Default: "" (must be set)
endpoint = "CHANGEME"

# API key in base64 format.
# Default: "" (no auth)
api_key = "CHANGEME"

# DPAPI-protected flag for api_key.
# Default: false
api_key_is_dpapi_protected = false

# Index name pattern.
# Default: "longhorizons-diagnostics"
index_pattern = "longhorizons-diagnostics"

# Compress bulk requests.
# Default: true
gzip = true

# Maximum documents per bulk request.
# Default: 100
bulk_max_docs = 100

# Maximum request body bytes before sending.
# Default: 500_000 (~500 KB)
bulk_max_bytes = 500000

# HTTP request timeout.
# Default: 15
timeout_seconds = 15

# TLS certificate pins.
# Default: []
tls_pins_sha256 = []

# Rarity threshold (0 = no rarity filter for diagnostics).
# Default: 0
event_rare_threshold = 0

# Dedup days (0 = no dedup for diagnostics).
# Default: 0
event_dedup_days = 0

# ---------------------------------------------------------------------------
# [export.health] — Agent health report export pipeline
# ---------------------------------------------------------------------------
# Periodic health reports: uptime, throughput, error rates, pipeline stats,
# ES/ETW/DB health flags, and audit recommendations.
# Sent to a dedicated index for monitoring and alerting.
# ---------------------------------------------------------------------------
[export.health]

# Enable this export pipeline.
# Default: true
enable = true

# Elasticsearch endpoint.
# Default: "" (must be set)
endpoint = "CHANGEME"

# API key in base64 format.
# Default: "" (no auth)
api_key = "CHANGEME"

# DPAPI-protected flag for api_key.
# Default: false
api_key_is_dpapi_protected = false

# Health report index name (single index, no date rotation).
# Default: "longhorizons-health"
index_pattern = "longhorizons-health"

# Compress bulk requests.
# Default: true
gzip = true

# HTTP request timeout.
# Default: 15
timeout_seconds = 15

# Seconds between health reports.
# Default: 30
report_interval_seconds = 30

# TLS certificate pins.
# Default: []
tls_pins_sha256 = []
